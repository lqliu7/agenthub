server:
  port: 9100
  host: "0.0.0.0"

  # Auth tokens — each entry is {token, name} for audit trail
  # install.sh auto-generates the first one on deploy
  tokens:
    - token: "nexus_ahub"
      name: "nexus_ahub"

security:
  audit_log: "/var/log/ahub-node/audit.jsonl"
  max_timeout: 7200
  max_output_bytes: 1048576
  confirm_expire_seconds: 300

  # Paths blocked for file_read/file_write on host
  blocked_paths:
    - "/etc/shadow"
    - "/etc/gshadow"
    - "/root/.ssh"
    - "/etc/sudoers"

  # Permanently blocked (regex patterns)
  blocked_patterns:
    - 'rm\s+-rf\s+/\s*$'
    - 'rm\s+-rf\s+/\*'
    - 'mkfs\.'
    - 'dd\s+if=.*/dev/'
    - ':\(\)\{\s*:\|:&\s*\};:'
    - 'shutdown|poweroff|reboot|init\s+0'
    - '>\s*/dev/sd'
    - 'chmod\s+-R\s+777\s+/'

  # Requires user confirmation (regex patterns)
  confirm_patterns:
    - 'rm\s+-rf'
    - 'rm\s+-r\s+'
    - 'docker\s+rm'
    - 'docker\s+rmi'
    - 'docker\s+system\s+prune'
    - 'kill\s+-9'
    - 'killall'
    - 'pkill'
    - 'apt\s+remove'
    - 'apt\s+purge'
    - 'yum\s+remove'
    - 'pip\s+uninstall'
    - 'systemctl\s+stop'
    - 'systemctl\s+disable'
